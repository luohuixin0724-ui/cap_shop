{% extends "base.html" %}
{% block title %}{{ product.name }} — 定制{% endblock %}
{% block topbar %}
<div class="subbar">
  <a class="subbar-back" href="{{ url_for('index', tab='menu') }}#menu">返回</a>
  <span class="subbar-title">私人定制</span>
  <span class="subbar-spacer"></span>
</div>
{% endblock %}
{% block body %}
<section class="detail-hero">
  <div class="detail-img">
    <img src="{{ url_for('static', filename=product.image) }}" alt="{{ product.name }}" width="280" height="280" />
  </div>
  <div class="detail-text">
    <h1 class="detail-name">{{ product.name }}</h1>
    <p class="detail-desc">{{ product.desc }}</p>
    <div class="detail-price">¥{{ CUSTOM_PRICE }} · 提前 {{ CUSTOM_LEAD_DAYS }} 天发图</div>
  </div>
</section>

<div class="sheet">
  <h2 class="sheet-title">上传与配送信息</h2>
  <form method="post" action="{{ url_for('book_custom') }}" enctype="multipart/form-data">
    <div class="form-row">
      <label for="need_date">希望送达日期</label>
      <input type="date" id="need_date" name="need_date" required min="{{ custom_min_iso }}" />
    </div>
    <div class="form-row">
      <label for="design_image">设计参考图</label>
      <input type="file" id="design_image" name="design_image" accept="image/*" required />
    </div>
    <div class="form-row">
      <label for="customer_name">联系人</label>
      <input type="text" id="customer_name" name="customer_name" required />
    </div>
    <div class="form-row">
      <label for="phone">手机号</label>
      <input type="tel" id="phone" name="phone" required />
    </div>
    <div class="form-row">
      <label for="address">收货地址</label>
      <textarea id="address" name="address" required></textarea>
    </div>
    <div class="form-row">
      <label for="notes">补充说明（可选）</label>
      <textarea id="notes" name="notes" placeholder="颜色、材质、校徽位置等"></textarea>
    </div>
    <button class="btn-block" type="submit">提交订单并支付</button>
  </form>
</div>
{% endblock %}
