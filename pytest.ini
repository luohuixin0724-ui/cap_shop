[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=35
    --ignore=tests/e2e
markers =
    e2e: 浏览器端到端测试（Playwright，需 playwright install chromium）

[coverage:run]
source = app
omit =
    */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
